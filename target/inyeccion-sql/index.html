<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - Inyección SQL</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <h1>Inicio de Sesión</h1>
            <p class="subtitle">Sistema de Prevención de Inyección SQL</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Ingrese su usuario" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required autocomplete="current-password">
                </div>
                <div id="errorMessage" class="error-message hidden"></div>
                <button type="submit" class="btn-primary">Ingresar</button>
            </form>
            <div class="info-box">
                <strong>Usuarios de prueba:</strong><br>
                admin / admin123<br>
                usuario / usuario123
            </div>
            <div class="info-box" style="margin-top:10px;text-align:center;">
                ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
