<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Inyección SQL</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <h1>Registro de Usuario</h1>
            <p class="subtitle">Sistema de Prevención de Inyección SQL</p>

            <div id="generalError" class="error-message hidden"></div>

            <form id="registerForm" action="api/register" method="POST">
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Nombre de usuario"
                           required autocomplete="username" value="">
                    <div id="usuarioError" class="field-error hidden"></div>
                </div>
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Nombre completo"
                           required value="">
                    <div id="nombreError" class="field-error hidden"></div>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password"
                           placeholder="Mínimo 6 caracteres" required minlength="6"
                           autocomplete="new-password">
                    <div id="passwordError" class="field-error hidden"></div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirmar Contraseña</label>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                           placeholder="Repita la contraseña" required autocomplete="new-password">
                    <div id="confirmPasswordError" class="field-error hidden"></div>
                </div>
                <div class="form-group">
                    <label for="rol">Rol</label>
                    <select id="rol" name="rol">
                        <option value="user">Usuario</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Crear Cuenta</button>
            </form>

            <div class="info-box">
                ¿Ya tienes cuenta? <a href="index.html">Inicia sesión aquí</a>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const errorsParam = urlParams.get('errors');
            const oldUsuario = urlParams.get('usuario');
            const oldNombre = urlParams.get('nombre');
            const oldRol = urlParams.get('rol');

            if (oldUsuario) document.getElementById('usuario').value = oldUsuario;
            if (oldNombre) document.getElementById('nombre').value = oldNombre;
            if (oldRol) document.getElementById('rol').value = oldRol;

            if (errorsParam) {
                try {
                    const errors = JSON.parse(decodeURIComponent(errorsParam));
                    Object.entries(errors).forEach(([key, msg]) => {
                        const errorDiv = document.getElementById(key + 'Error');
                        const generalDiv = document.getElementById('generalError');
                        if (key === 'general') {
                            generalDiv.textContent = msg;
                            generalDiv.classList.remove('hidden');
                        } else if (errorDiv) {
                            errorDiv.textContent = msg;
                            errorDiv.classList.remove('hidden');
                        }
                    });
                } catch (e) {}
            }

            document.getElementById('registerForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const form = e.target;
                const formData = new FormData(form);
                try {
                    const response = await fetch(form.action, {
                        method: 'POST',
                        body: new URLSearchParams(formData)
                    });
                    if (response.redirected) {
                        window.location.href = response.url;
                    } else {
                        const html = await response.text();
                        document.open();
                        document.write(html);
                        document.close();
                    }
                } catch (err) {
                    document.getElementById('generalError').textContent = 'Error de conexión';
                    document.getElementById('generalError').classList.remove('hidden');
                }
            });
        });
    </script>
    <style>
        .field-error {
            color: #d32f2f;
            font-size: 0.85em;
            margin-top: 4px;
        }
        .field-error.hidden, .error-message.hidden {
            display: none;
        }
        select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            background: white;
        }
        select:focus {
            outline: none;
            border-color: #667eea;
        }
    </style>
</body>
</html>
